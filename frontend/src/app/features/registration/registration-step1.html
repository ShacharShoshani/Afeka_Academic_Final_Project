<div class="page">
  <header class="header">
    <span class="brand">Livin</span>
    <span class="step-label">Step 1 of 3</span>
  </header>

  <app-progress-bar [currentStep]="1" [totalSteps]="3" />

  <div class="content">
    <!-- Sparkle icon -->
    <svg class="sparkle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L14.09 8.26L20 9.27L15.55 13.97L16.91 20L12 16.9L7.09 20L8.45 13.97L4 9.27L9.91 8.26L12 2Z" fill="currentColor"/>
      <path d="M5 3L5.5 5L7 5.5L5.5 6L5 8L4.5 6L3 5.5L4.5 5L5 3Z" fill="currentColor" opacity="0.6"/>
      <path d="M19 3L19.5 5L21 5.5L19.5 6L19 8L18.5 6L17 5.5L18.5 5L19 3Z" fill="currentColor" opacity="0.6"/>
    </svg>

    <h1 class="title">Welcome to Livin!</h1>
    <p class="subtitle">How do you want to use the app?</p>

    <!-- Role selection cards -->
    <div class="cards">
      <button
        class="role-card"
        [class.selected]="selectedRole() === 'owner'"
        (click)="selectRole('owner')"
      >
        <div class="role-icon">
          <!-- Paw icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="8" cy="7" rx="2" ry="2.5" fill="currentColor"/>
            <ellipse cx="16" cy="7" rx="2" ry="2.5" fill="currentColor"/>
            <ellipse cx="5" cy="12" rx="1.8" ry="2.2" fill="currentColor"/>
            <ellipse cx="19" cy="12" rx="1.8" ry="2.2" fill="currentColor"/>
            <path d="M7.5 16C7.5 13.5 9.5 12 12 12C14.5 12 16.5 13.5 16.5 16C16.5 18.5 14.5 20 12 20C9.5 20 7.5 18.5 7.5 16Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="role-text">
          <span class="role-title">I'm a Pet/Plant Owner</span>
          <span class="role-subtitle">I need someone to care for my pets or plants</span>
        </div>
        @if (selectedRole() === 'owner') {
          <svg class="checkmark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="currentColor"/>
            <path d="M8 12L11 15L16 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>

      <button
        class="role-card"
        [class.selected]="selectedRole() === 'caretaker'"
        (click)="selectRole('caretaker')"
      >
        <div class="role-icon">
          <!-- Heart icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="role-text">
          <span class="role-title">I'm a Caretaker</span>
          <span class="role-subtitle">I want to help care for pets and plants</span>
        </div>
        @if (selectedRole() === 'caretaker') {
          <svg class="checkmark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="currentColor"/>
            <path d="M8 12L11 15L16 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <div class="footer">
    <button
      class="continue-btn"
      [disabled]="!canContinue()"
      (click)="onContinue()"
    >
      Continue
      <span aria-hidden="true">&rarr;</span>
    </button>
  </div>
</div>
